name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: make verify
      - name: Build and inspect wheel
        run: |
          python -m build --wheel
          python -c "import glob, zipfile; wheels = glob.glob('dist/*.whl'); assert len(wheels) == 1; names = zipfile.ZipFile(wheels[0]).namelist(); assert 'repogent/py.typed' in names; assert any(name.endswith('.dist-info/licenses/LICENSE') for name in names)"
      - name: Install wheel in isolated environment
        run: |
          python -m venv /tmp/repogent-wheel-smoke
          /tmp/repogent-wheel-smoke/bin/python -m pip install --no-deps --no-index dist/repogent-*.whl
          /tmp/repogent-wheel-smoke/bin/python -c "from importlib.resources import files; import repogent; assert files(repogent).joinpath('py.typed').is_file()"
